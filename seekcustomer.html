<style>
  :root{
    --ink:#12193A;
    --ink-soft:#3A4270;
    --paper:#F5F6FA;
    --paper-dim:#ECEEF7;
    --blue:#2851FF;
    --blue-dark:#1B3AC4;
    --pink:#FF3D7F;
    --sky:#6E8CFF;
    --danger:#D6335F;
    --line:rgba(18,25,58,0.12);
    --line-light:rgba(245,246,250,0.16);
    --radius:10px;
    --disp:'Space Grotesk',sans-serif;
    --body:'IBM Plex Sans',sans-serif;
    --mono:'IBM Plex Mono',monospace;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{font-family:var(--body); background:var(--paper-dim); color:var(--ink); -webkit-font-smoothing:antialiased; min-height:100vh;}
  button{font-family:inherit; cursor:pointer;}
  ::selection{background:var(--pink); color:var(--ink);}

  #app{min-height:100vh; display:flex; flex-direction:column;}

  .dash-header{
    background:var(--ink); color:var(--paper); display:flex; align-items:center; justify-content:space-between;
    padding:14px 24px;
  }
  .brand{display:flex; align-items:center;}
  .brand-logo{display:block; height:26px; width:auto;}
  .brand-logo--light{display:none;}
  .brand-logo--dark{display:block;}
  .dash-header-meta{display:flex; align-items:center; gap:14px;}
  .header-tag{
    font-family:var(--mono); font-size:11px; color:var(--sky);
    text-transform:uppercase; letter-spacing:0.04em;
  }
  .auth-status{
    font-size:12px; color:rgba(245,246,250,0.72);
    padding:6px 10px; border:1px solid var(--line-light); border-radius:8px;
  }
  .auth-status.ok{color:#7dffb3; border-color:rgba(125,255,179,0.35);}
  .auth-status.err{color:#ff9bb5; border-color:rgba(255,155,181,0.35);}

  .main{
    flex:1; max-width:1180px; width:100%; margin:0 auto; padding:28px 24px 48px;
  }
  .page-head{
    display:flex; align-items:flex-end; justify-content:space-between; gap:20px;
    margin-bottom:22px; flex-wrap:wrap;
  }
  .page-head h1{
    font-family:var(--disp); font-size:28px; font-weight:700; line-height:1.15;
  }
  .page-head p{
    margin-top:6px; color:var(--ink-soft); font-size:14px; max-width:520px; line-height:1.5;
  }
  .page-actions{display:flex; align-items:center; gap:12px; flex-wrap:wrap;}

  .btn-primary{
    display:inline-flex; align-items:center; justify-content:center; gap:8px;
    padding:12px 18px; background:var(--blue); color:#fff; border:none; border-radius:var(--radius);
    font-weight:600; font-size:14px; letter-spacing:0.01em; transition:background .15s, transform .1s;
  }
  .btn-primary:hover{background:var(--blue-dark);}
  .btn-primary:active{transform:scale(0.98);}
  .btn-primary:disabled{opacity:0.65; cursor:not-allowed; transform:none;}
  .btn-primary svg{width:16px; height:16px;}

  .campaign-status{
    display:none; margin-bottom:16px; padding:12px 14px; border-radius:10px;
    font-size:13.5px; line-height:1.45;
  }
  .campaign-status.show{display:block;}
  .campaign-status.success{background:rgba(40,81,255,0.08); color:var(--blue-dark); border:1px solid rgba(40,81,255,0.2);}
  .campaign-status.error{background:rgba(214,51,95,0.08); color:var(--danger); border:1px solid rgba(214,51,95,0.2);}
  .campaign-status.info{background:rgba(18,25,58,0.06); color:var(--ink-soft); border:1px solid var(--line);}

  .table-wrap{
    background:#fff; border:1px solid var(--line); border-radius:14px; overflow:hidden;
    box-shadow:0 8px 28px rgba(18,25,58,0.05);
  }
  .table-scroll{overflow-x:auto;}
  table{width:100%; border-collapse:collapse; min-width:920px;}
  th{
    text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:0.04em;
    color:var(--ink-soft); background:var(--paper-dim); padding:12px 16px; font-weight:600;
  }
  td{padding:14px 16px; font-size:14px; border-top:1px solid var(--line); vertical-align:middle;}
  tbody tr{transition:background .1s;}
  tbody tr:hover{background:var(--paper-dim);}
  .name-cell{font-weight:600;}
  .mono{font-family:var(--mono); font-size:12.5px;}
  .package-pill{
    display:inline-block; font-size:12px; font-weight:600; padding:4px 10px; border-radius:20px;
    background:rgba(40,81,255,0.1); color:var(--blue-dark);
  }
  .package-pill.premium{background:rgba(255,61,127,0.12); color:#B0124A;}
  .package-pill.plus{background:rgba(110,140,255,0.16); color:#2A3F9E;}
  .ads-count{font-family:var(--disp); font-weight:700; font-size:16px;}
  .table-foot{
    display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap;
    padding:12px 16px; border-top:1px solid var(--line); background:#fff;
    font-size:12.5px; color:var(--ink-soft);
  }

  @media (max-width:720px){
    .main{padding:20px 14px 36px;}
    .page-head h1{font-size:24px;}
    .dash-header{padding:12px 14px;}
    .btn-primary{width:100%;}
    .page-actions{width:100%;}
  }
</style>
</head>
<body>
  <script>
'use strict'
let url = new URL(document.location.href)
let gc_region = url.searchParams.get('gc_region')
let gc_clientId = url.searchParams.get('gc_clientId')
let gc_redirectUrl = url.searchParams.get('gc_redirectUrl')
let currentLeads = [];
const OUTBOUND_TEST_PHONE = "+61450696340";

// Fill in your Genesys contact list ID later
const OUTBOUND_CONTACT_LIST_ID = "2e1ed30b-486b-4ef1-bd3e-e0cb924b8356";

// Work item (Task Management) — POST /api/v2/taskmanagement/workitems
const WORKITEM_TYPE_ID = "23b77817-b4e2-4257-aa73-188b7ce4175e";
const WORKITEM_WORKBIN_ID = "9685b45d-a478-4078-b7b7-bcda3544f02f";
const WORKITEM_QUEUE_ID = "f53cf37d-b028-4b96-bb3e-7deeb2cee08f";
const WORKITEM_EXTERNAL_ID = "882d3ad1-5c5a-44d1-8803-9fd888a3f39d";

console.log(url);
console.log(gc_region);
console.log(gc_clientId);
console.log(gc_redirectUrl);

//Getting and setting the GC details from dynamic URL and session storage
gc_region ? localStorage.setItem('gc_region', gc_region) : (gc_region = localStorage.getItem('gc_region'))
gc_clientId ? localStorage.setItem('gc_clientId', gc_clientId) : (gc_clientId = localStorage.getItem('gc_clientId'))
gc_redirectUrl ? localStorage.setItem('gc_redirectUrl', gc_redirectUrl) : (gc_redirectUrl = localStorage.getItem('gc_redirectUrl'))

const platformClient = require('platformClient');
const client = platformClient.ApiClient.instance
console.log(platformClient.VERSION)
const usersApi = new platformClient.UsersApi();
let outboundAPI = new platformClient.OutboundApi();
let taskManagementAPI = new platformClient.TaskManagementApi();

console.log(typeof platformClient.ApiClient)
console.log(typeof client.loginWithPKCE)

function setAuthStatus(kind, text) {
  const statusEl = document.getElementById('auth-status');
  if (!statusEl) return;
  statusEl.className = 'auth-status' + (kind ? ' ' + kind : '');
  statusEl.textContent = text;
}

async function start() {
  console.log("START")
  try {
    client.setEnvironment(gc_region)
    client.setPersistSettings(true, '_mm_')
    console.log('SDK:', platformClient)
    console.log('%cLogging in to Genesys Cloud', 'color: green')
    await client.loginPKCEGrant(gc_clientId, gc_redirectUrl, {})

    let user = await usersApi.getUsersMe({})
    console.log(user)
    setAuthStatus('ok', 'Genesys: ' + (user.name || user.username || 'connected'))
  } catch (err) {
    console.log('Error: ', err)
    setAuthStatus('err', 'Genesys login required')
  }
}

/**
 * Add Sarah Johnson to the Genesys contact list
 * POST /api/v2/outbound/contactlists/{contactListId}/contacts
 */
async function outreach() {
  const status = document.getElementById('campaign-status');
  const btn = document.getElementById('outbound-campaign-btn');

  const sarah = CUSTOMERS.find(function(c) { return c.name === 'Sarah Johnson'; });
  currentLeads = [{
    contactname: sarah.name,
    email: sarah.email,
    phone: OUTBOUND_TEST_PHONE,
    whatsapp: OUTBOUND_TEST_PHONE
  }];

  // Body for POST /api/v2/outbound/contactlists/{contactListId}/contacts
  // Columns must match MarketingAds contact list schema
  const body = [{
    contactListId: OUTBOUND_CONTACT_LIST_ID,
    data: {
      id: '2',
      employername: 'Northside HR',
      industry: 'Human Resources',
      contactname: sarah.name,
      contacttitle: 'Hiring Manager',
      phone: OUTBOUND_TEST_PHONE,
      email: sarah.email,
      sourcechannel: 'SEEK Ad Package',
      signal: 'Recent Premium purchase',
      whatsapp: OUTBOUND_TEST_PHONE
    },
    callable: true,
    phoneNumberStatus: {
      phone: { callable: true },
      whatsapp: { callable: true }
    },
    contactableStatus: {
      Voice: { contactable: true },
      WhatsApp: { contactable: true }
    }
  }];

  btn.disabled = true;
  btn.textContent = 'Sending outreach…';
  status.className = 'campaign-status show info';
  status.textContent = 'Adding Sarah Johnson to Genesys contact list…';

  console.log('Outreach payload (POST /api/v2/outbound/contactlists/{contactListId}/contacts):', body);

  // POST /api/v2/taskmanagement/workitems
  const workitemBody = {
    name: 'Sarah Johnson',
    description: 'Ads Order Package',
    typeId: WORKITEM_TYPE_ID,
    workbinId: WORKITEM_WORKBIN_ID,
    queueId: WORKITEM_QUEUE_ID,
    externalId: WORKITEM_EXTERNAL_ID,
    customFields: {
      business_name_text: 'Northside HR',
      name_text: 'Sarah Johnson',
      numberofads_text: String(sarah.adsIssued),
      order_number_text: 'ORD-SEEK-10042',
      package_text: sarah.packageName,
      seekid_text: '48291'
    }
  };

  try {
    const data = await outboundAPI.postOutboundContactlistContacts(OUTBOUND_CONTACT_LIST_ID, body);
    console.log('postOutboundContactlistContacts success! data: ' + JSON.stringify(data, null, 2));

    status.textContent = 'Creating Genesys work item for Sarah Johnson…';
    console.log('Work item payload (POST /api/v2/taskmanagement/workitems):', workitemBody);

    const workitem = await taskManagementAPI.postTaskmanagementWorkitems(workitemBody);
    console.log('postTaskmanagementWorkitems success! data: ' + JSON.stringify(workitem, null, 2));

    status.className = 'campaign-status show success';
    status.textContent = 'Outreach + work item created for Sarah Johnson (' + OUTBOUND_TEST_PHONE + ').';
    return { contact: data, workitem: workitem };
  } catch (err) {
    console.log('There was a failure calling outreach / work item APIs');
    console.error(err);
    status.className = 'campaign-status show error';
    status.textContent = 'Could not complete outreach. Check Genesys login, contact list, and work item IDs. See console for details.';
    throw err;
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.81.36 1.6.7 2.35a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.75.34 1.54.57 2.35.7A2 2 0 0 1 22 16.92z"/></svg> Outbound Campaign (Agentless)';
  }
}

  </script>

          Outbound Campaign (Agentless)
        </button>
      </div>
    </div>

    <div class="campaign-status" id="campaign-status" role="status" aria-live="polite"></div>

    <div class="table-wrap">
      <div class="table-scroll">
        <table>
          <thead>

      </div>
      <div class="table-foot">
        <span id="customer-count">20 customers</span>
        <span>Sorted by most recent purchase</span>
      </div>
    </div>
  </main>
</div>
